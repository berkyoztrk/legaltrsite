<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGAL TR - Yetkili Girişi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="login-container">
        <div class="login-box">
            <h2>LSPD Yetkili Paneli</h2>
            <p>Devam etmek için kimliğinizi doğrulayın.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-login">Giriş Yap</button>
            </form>
            <br>
            <a href="index.html" style="color: #bbb; text-decoration: none; font-size: 14px;">← Ana Sayfaya Dön</a>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
